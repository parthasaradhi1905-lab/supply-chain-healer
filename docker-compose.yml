version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: aegis-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: aegis-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

volumes:
  neo4j_data:
